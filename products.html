<!-- 👉 LOAD products.js first -->
<script src="js/products.js"></script>

<!-- 👉 Then your display script -->
<script>
    // Get product ID from URL
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get("id");

    // Load product data
    const product = products[id];

    if (product) {
        document.getElementById("productTitle").innerText = product.title;
        document.getElementById("productImage").src = product.image;
        document.getElementById("productDesc").innerText = product.description;
        document.getElementById("productGrits").innerText = product.grits;
        document.getElementById("productUsage").innerText = product.usage;
        product.features.forEach(f => {
            let li = document.createElement("li");
            li.innerText = f;
            document.getElementById("productFeatures").appendChild(li);
        });
    } else {
        document.body.innerHTML = "<h2>Product Not Found</h2>";
    }
</script>
